name: Delete Mistaken Package Version

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - name: Delete GitHub Packages version 1.0.2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version_id="$(gh api --paginate \
            /users/AyoParadis/packages/npm/react-native-expo-speech-to-text/versions \
            --jq '.[] | select(.name == "1.0.2") | .id')"
          test -n "$version_id"
          gh api --method DELETE \
            "/users/AyoParadis/packages/npm/react-native-expo-speech-to-text/versions/$version_id"
