name: CI

on:
  push:
  pull_request:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      - run: pnpm lint

  ios-logic:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: swiftc ios/SpeechToTextTranscriptAccumulator.swift tests/ios/SpeechToTextTranscriptAccumulatorTests.swift -o /tmp/speech-to-text-tests
      - run: /tmp/speech-to-text-tests
